<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Chart Viewer</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #111318; color: #c8d0dc; }
        .ticker-table th.sorted-column { background-color: #1e2d42 !important; }
        .ticker-table td.sorted-column { background-color: #161c26; }
        .ticker-list { width: 825px; background-color: #111318; padding: 0; overflow-y: auto; border-right: 1px solid #22272f; }
        .chart-container { flex: 1; display: flex; flex-direction: column; padding: 10px; background-color: #111318; min-height: 0; }
        .group-container { margin-bottom: 15px; }
        .group-header {
            background-color: #191d24; padding: 7px 14px; font-weight: 500; font-size: 0.82em;
            display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
            position: sticky; top: 0; z-index: 3; cursor: pointer; color: #c8d0dc;
            border-bottom: 1px solid #22272f; letter-spacing: 0.04em; text-transform: uppercase;
        }
        .group-header:hover { background-color: #1e242e; }
        .legend { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .legend-item { padding: 2px 6px; border-radius: 6px; font-size: 0.75em; color: white; user-select: none; }
        .ticker-table { width: 100%; border-collapse: collapse; font-size: 0.85em; table-layout: fixed; }
        .ticker-table th:nth-child(1),  .ticker-table td:nth-child(1)  { width: 84px;  padding: 6px 6px; }
        .ticker-cell { display: flex; align-items: center; justify-content: space-between; gap: 3px; }
        .ticker-table th:nth-child(2),  .ticker-table td:nth-child(2)  { width: 48px;  padding: 6px 4px; }
        .ticker-table th:nth-child(3),  .ticker-table td:nth-child(3)  { width: 60px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(4),  .ticker-table td:nth-child(4)  { width: 58px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(5),  .ticker-table td:nth-child(5)  { width: 58px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(6),  .ticker-table td:nth-child(6)  { width: 58px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(7),  .ticker-table td:nth-child(7)  { width: 58px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(8),  .ticker-table td:nth-child(8)  { width: 60px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(9),  .ticker-table td:nth-child(9)  { width: 68px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(10), .ticker-table td:nth-child(10) { width: 62px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(11), .ticker-table td:nth-child(11) { width: 48px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(12), .ticker-table td:nth-child(12) { width: 46px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table th:nth-child(13), .ticker-table td:nth-child(13) { width: 90px;  padding: 6px 4px; overflow: hidden; }
        .ticker-table thead { position: sticky; z-index: 2; }
        .ticker-table th {
            text-align: left; padding: 6px 8px; background-color: #13171e; cursor: pointer; user-select: none;
            font-weight: 500; font-size: 0.78em; letter-spacing: 0.06em; text-transform: uppercase;
            border-bottom: 1px solid #22272f; color: #a8bdd4;
        }
        .ticker-table th:hover { background-color: #1a1f28; color: #dce8f0; }
        .ticker-table th.sortable { cursor: pointer; }
        .ticker-table th.sortable:hover { color: #c8d0dc; }
        .ticker-table th.sort-asc::after { content: " ↑"; }
        .ticker-table th.sort-desc::after { content: " ↓"; }
        .ticker-table td { padding: 5px 4px; border-bottom: 1px solid #191d24; vertical-align: middle; color: #9aaab8; }
        .ticker-row { cursor: pointer; transition: background 0.15s; }
        .ticker-row:hover { background-color: #161a21; }
        .ticker-row.active { background-color: #1a2333; }
        .ticker-table td.price-up { color: #34d4a4 !important; font-weight: 500; }
        .ticker-table td.price-down { color: #e05c5c !important; font-weight: 500; }
        .value-visualization { position: relative; display: inline-block; padding: 2px 4px; border-radius: 3px; min-width: 45px; max-width: 100%; text-align: right; }
        .value-bar { position: absolute; top: 0; height: 100%; border-radius: 3px; opacity: 0.15; z-index: 0; max-width: 100%; }
        .value-bar.positive { background-color: #34d4a4; left: 0; right: auto; }
        .value-bar.negative { background-color: #e05c5c; right: 0; left: auto; }
        .value-text { position: relative; z-index: 1; }
        .tradingview-widget-container { flex: 1; min-height: 0; }
        .key-hint { font-size: 11px; color: #4a5a6e; margin-top: 15px; padding: 5px 10px; background-color: #191d24; border-radius: 4px; position: sticky; bottom: 0; border: 1px solid #22272f; }
        .long-etf { color: #34d4a4; cursor: pointer; text-decoration: underline; }
        .short-etf { color: #e05c5c; cursor: pointer; text-decoration: underline; }
        .etf-list { white-space: nowrap; font-size: 0.8em; }
        .etf-list span:hover { font-weight: 600; }
        .ticker-label { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 5px; background-color: #1e242c; color: #7ab0d8; font-size: 0.92em; font-weight: 500; }
        .abc-rating { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-weight: 500; font-size: 0.78em; color: white; }
        .abc-a { background-color: #0a2d20; color: #34d4a4; }
        .abc-b { background-color: #0d2040; color: #5aabf0; }
        .abc-c { background-color: #2d1a0a; color: #e08844; }
        .abc-d { background-color: #2d0a0a; color: #e05c5c; }
        .loading-msg { padding: 20px; text-align: center; color: #4a5a6e; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111318; }
        ::-webkit-scrollbar-thumb { background: #22272f; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2e3744; }

        /* Column header tooltips */
        #col-tooltip {
            position: fixed;
            background-color: #191d24;
            color: #9aaab8;
            padding: 7px 10px;
            border-radius: 5px;
            font-size: 0.75em;
            font-weight: normal;
            white-space: normal;
            width: 200px;
            line-height: 1.4;
            border: 1px solid #2e3744;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 9999;
            text-align: left;
        }
        #col-tooltip.visible { opacity: 1; }
        /* DistMA settings */
        .dist-ma-header { white-space: nowrap; }
        .dist-ma-settings-btn {
            display: inline-block; cursor: pointer; padding: 2px 7px; border-radius: 4px;
            color: #4a5a6e; font-size: 0.9em; vertical-align: middle; line-height: 1;
            background: #1e242c; letter-spacing: 1px;
        }
        .dist-ma-settings-btn:hover { color: #c8d0dc; background: #252d38; }
        .dist-ma-dropdown {
            display: none; position: fixed; background: #191d24; border: 1px solid #2e3744;
            border-radius: 7px; padding: 10px 12px; z-index: 10000; min-width: 185px;
            font-weight: normal; font-size: 0.82em; color: #c8d0dc; cursor: default;
        }
        .dist-ma-dropdown.open { display: block; }
        .dist-ma-row { margin-bottom: 8px; }
        .dist-ma-row:last-child { margin-bottom: 0; }
        .dist-ma-row > label { display: block; color: #4a5a6e; font-size: 0.78em; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
        .dist-ma-btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .dist-ma-btn {
            padding: 3px 9px; border-radius: 4px; border: 1px solid #2e3744;
            background: #111318; color: #9aaab8; cursor: pointer; font-size: 0.9em; font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .dist-ma-btn:hover { background: #1e242c; color: #c8d0dc; }
        .dist-ma-btn.active { background: #185fa5; border-color: #378add; color: #fff; }

        /* MultiChart button */
        .multichart-btn {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 0.72em; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
            background-color: #1e242c; color: #a8bdd4;
            padding: 3px 8px; border: 1px solid #2e3744; border-radius: 3px;
            cursor: pointer; margin-left: auto; flex-shrink: 0;
        }
        .multichart-btn:hover { background-color: #252d38; color: #c8d0dc; }
        .multichart-btn.active { background-color: #185fa5; border-color: #378add; color: #fff; }

        /* Single / multi panel layout */
        #single-chart-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        #multi-chart-panel { flex: 1; overflow-y: auto; display: none; padding: 4px; }
        .multi-chart-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
        .mini-chart-wrap { position: relative; height: 360px; background: #13171e; border-radius: 4px; border: 1px solid #22272f; overflow: hidden; }
        .mini-chart-label { position: absolute; top: 4px; left: 6px; z-index: 10; font-size: 0.75em; font-weight: 600; color: #7ab0d8; pointer-events: none; background: rgba(17,19,24,0.75); padding: 1px 5px; border-radius: 3px; }

        /* Ticker cell flex layout */
        .ticker-cell { display: flex; align-items: center; justify-content: space-between; gap: 3px; }

        /* Holdings button */
        .holdings-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 15px; height: 15px; border-radius: 50%; border: 1px solid #2e3744;
            background: transparent; color: #4a5a6e; font-size: 8px; cursor: pointer;
            flex-shrink: 0; padding: 0; line-height: 1;
        }
        .holdings-btn:hover { border-color: #7ab0d8; color: #7ab0d8; }

        /* Holdings modal */
        .holdings-modal-overlay {
            position: fixed; inset: 0; background: transparent; display: none; z-index: 9999;
        }
        .holdings-modal {
            position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
            background: #13171e; border-radius: 8px; border: 1px solid #2e3744;
            padding: 10px 12px 8px; width: 300px; max-height: 460px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); display: flex; flex-direction: column;
        }
        .holdings-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #c8d0dc; flex-shrink: 0;
        }
        .holdings-modal-close {
            background: transparent; border: none; color: #4a5a6e;
            cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0 2px;
        }
        .holdings-modal-close:hover { color: #c8d0dc; }
        .holdings-list { overflow-y: auto; flex: 1; }
        .holdings-item {
            display: flex; align-items: center; gap: 8px; padding: 5px 8px;
            border-bottom: 1px solid #191d24; cursor: pointer; font-size: 0.81em;
        }
        .holdings-item:last-child { border-bottom: none; }
        .holdings-item:hover { background-color: #161a21; }
        .holdings-item.active { background-color: #1a2333; }
        .holdings-rank { color: #4a5a6e; width: 18px; flex-shrink: 0; text-align: right; }
        .holdings-symbol { font-weight: 600; color: #7ab0d8; flex: 1; }
        .holdings-weight { color: #34d4a4; }
        .holdings-msg { padding: 16px; text-align: center; color: #4a5a6e; font-size: 0.82em; }
    </style>
</head>
<body>
    <div class="ticker-list">
        <div id="groups-container"></div>
        <div class="key-hint">↑ ↓ Use arrow keys to navigate · Data auto-refreshed daily via GitHub Actions · Yahoo Finance</div>
    </div>
    <div class="chart-container">
        <div id="single-chart-panel">
            <div class="tradingview-widget-container">
                <div id="tradingview-chart" style="height:100%;width:100%;"></div>
                <div style="color:#9ca3af;font-size:11px;margin-top:4px;">
                    <a href="https://www.tradingview.com/" target="_blank" rel="noopener" style="color:#9ca3af;">Track all markets on TradingView</a>
                </div>
            </div>
        </div>
        <div id="multi-chart-panel">
            <div class="multi-chart-grid" id="multi-chart-grid"></div>
        </div>
    </div>

    <div id="holdings-modal-overlay" class="holdings-modal-overlay" onclick="closeHoldings()">
        <div class="holdings-modal" onclick="event.stopPropagation()">
            <div class="holdings-modal-header">
                <span id="holdings-modal-title">Holdings</span>
                <button type="button" class="holdings-modal-close" onclick="closeHoldings()">×</button>
            </div>
            <div class="holdings-list" id="holdings-modal-content"></div>
        </div>
    </div>

    <div id="dist-ma-dropdown" class="dist-ma-dropdown">
        <div class="dist-ma-row">
            <label>Type</label>
            <div class="dist-ma-btn-group">
                <button class="dist-ma-btn dist-ma-type-btn active" data-type="SMA" onclick="setDistMAType('SMA')">SMA</button>
                <button class="dist-ma-btn dist-ma-type-btn" data-type="EMA" onclick="setDistMAType('EMA')">EMA</button>
            </div>
        </div>
        <div class="dist-ma-row">
            <label>Period</label>
            <div class="dist-ma-btn-group">
                <button class="dist-ma-btn dist-ma-len-btn" data-len="5" onclick="setDistMALength(5)">5</button>
                <button class="dist-ma-btn dist-ma-len-btn" data-len="10" onclick="setDistMALength(10)">10</button>
                <button class="dist-ma-btn dist-ma-len-btn" data-len="21" onclick="setDistMALength(21)">21</button>
                <button class="dist-ma-btn dist-ma-len-btn active" data-len="50" onclick="setDistMALength(50)">50</button>
                <button class="dist-ma-btn dist-ma-len-btn" data-len="200" onclick="setDistMALength(200)">200</button>
            </div>
        </div>
    </div>

    <div id="col-tooltip"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
(function() {
    let chartWidget = null;
    let currentIndex = 0;
    let allTickerRows = [];
    let currentSortStates = {};
    let snapshot = null;
    let meta = null;
    let activeMAType = localStorage.getItem('distMAType') || 'SMA';
    let activeMALength = parseInt(localStorage.getItem('distMALength') || '50');

    function safeGroupId(name) {
        return name.replace(/[^a-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }
    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function vizWidth(value, minVal, maxVal) {
        if (value == null) return 0;
        if (minVal >= maxVal) return 0;
        if (value >= 0) {
            if (maxVal <= 0) return 0;
            return Math.min(100, Math.max(0, (value / maxVal) * 100));
        }
        if (minVal >= 0) return 0;
        return Math.min(100, Math.max(0, (Math.abs(value) / Math.abs(minVal)) * 100));
    }

    function getGroupLabelClass(groupName, ticker) {
        if (groupName === 'Industries' && meta && meta.Industries_COLORS && meta.Industries_COLORS[ticker])
            return 'ticker-label-' + ticker;
        var safe = groupName.replace(/\s+/g, '-').replace(/&/g, '-');
        return 'ticker-label-' + safe;
    }

    function renderGroups() {
        if (!snapshot || !snapshot.groups) {
            document.getElementById('groups-container').innerHTML = '<div class="loading-msg">LOADING DATA...</div>';
            return;
        }
        var html = '';
        var groupOrder = ['Indices', 'S&P Style ETFs', 'Sel Sectors', 'EW Sectors', 'Industries', 'Countries', 'Crypto'];
        for (var g = 0; g < groupOrder.length; g++) {
            var groupName = groupOrder[g];
            var rows = snapshot.groups[groupName];
            if (!rows || rows.length === 0) continue;
            var safeId = safeGroupId(groupName);
            var ranges = Object.assign({ daily: [-10,10], '1w': [-20,20], '1m': [-30,30], '3m': [-40,40], 'ytd': [-50,50], 'vs_spy': [-20,20], 'vs_spy_3m': [-30,30] }, (snapshot.column_ranges && snapshot.column_ranges[groupName]) || {});
            html += '<div class="group-container" id="group-' + safeId + '">';
            html += '<div class="group-header" onclick="scrollToGroup(\'' + groupName.replace(/'/g, "\\'") + '\')">';
            html += '<span>' + groupName + '</span>';
            if (groupName === 'Industries' && meta && meta.SECTOR_COLORS) {
                html += '<div class="legend" onclick="event.stopPropagation()">';
                for (var s in meta.SECTOR_COLORS)
                    html += '<span class="legend-item" style="background-color:' + meta.SECTOR_COLORS[s] + '">' + s + '</span>';
                html += '</div>';
            }
            html += '<button class="multichart-btn" data-group="' + escapeHtml(groupName) + '" onclick="event.stopPropagation();toggleMultiChart(\'' + groupName.replace(/'/g, "\\'") + '\')">MultiChart</button>';
            html += '</div>';
            html += '<table class="ticker-table" data-group="' + escapeHtml(groupName) + '"><thead><tr>';
            var th = function(key, label, tip) { return '<th class="sortable" data-sort-by="' + key + '"' + (tip ? ' data-tooltip="' + tip + '"' : '') + '>' + label + '</th>'; };
            html += th('symbol', 'Ticker', 'Ticker symbol. Click to sort alphabetically.');
            html += th('abc', 'Grade', 'Trend grade based on moving averages. A = EMA10 > EMA20 > SMA50 (uptrend). B = mixed signals. C = EMA10 < EMA20 < SMA50 (downtrend).');
            html += th('daily', 'Daily', 'Price change from previous close to today\'s close.');
            html += th('1w', '1W', 'Price change over the last 5 trading days (1 week).');
            html += th('1m', '1M', 'Price change over the last 21 trading days (1 month).');
            html += th('3m', '3M', 'Price change over the last 63 trading days (3 months).');
            html += th('ytd', 'YTD', 'Year-to-date return from the first trading day of the current calendar year.');
            html += th('vs_spy', '1M RS', 'Relative strength vs SPY over the last 21 trading days (~1 month). Positive = outperforming SPY. Negative = underperforming.');
            html += th('vs_spy_3m', '3M RS', 'Relative strength vs SPY over the last 63 trading days (~3 months). Positive = outperforming SPY. Negative = underperforming.');
            var distMATh = g === 0
                ? '<th class="sortable dist-ma-header" data-sort-by="dist_ma" data-tooltip="% distance from the selected moving average. Click ⋯ to change type &amp; period." style="position:relative;padding-top:16px;"><span class="dist-ma-settings-btn" style="position:absolute;top:2px;left:4px;" onclick="event.stopPropagation();toggleDistMASettings(this)">⋯</span>DistMA</th>'
                : '<th class="sortable dist-ma-header" data-sort-by="dist_ma" data-tooltip="% distance from the selected moving average. Use ⋯ on the Indices DistMA column to change type &amp; period.">DistMA</th>';
            html += distMATh;
            html += th('adr_pct', 'ADR%', 'Average Daily Range % — SMA of (High - Low) over 20 days divided by close. Measures typical daily volatility.');
            html += th('cr', 'CR', 'Closing Range — where price closed within today\'s high/low range. >60% strong close (green), 30-60% mid (orange), <=30% weak close (red).');
            html += th('letf', 'LETF', 'Leveraged ETFs linked to this instrument. Green = long/bullish. Red = short/inverse.');
            html += '</tr></thead><tbody id="' + safeId + '-body">';
            for (var i = 0; i < rows.length; i++) {
                var r = rows[i];
                var daily = r.daily, five = r['1w'], twenty = r['1m'], fifty = r['3m'], ytd = r.ytd, vsSpy = r.vs_spy, vsSpy3m = r.vs_spy_3m;
                var dailyW    = vizWidth(daily,   ranges.daily[0],        ranges.daily[1]);
                var fiveW     = vizWidth(five,    ranges['1w'][0],  ranges['1w'][1]);
                var twentyW   = vizWidth(twenty,  ranges['1m'][0],  ranges['1m'][1]);
                var fiftyW    = vizWidth(fifty,   ranges['3m'][0],  ranges['3m'][1]);
                var ytdW      = vizWidth(ytd,     ranges['ytd'][0],       ranges['ytd'][1]);
                var vsSpyW    = vizWidth(vsSpy,   ranges['vs_spy'][0],    ranges['vs_spy'][1]);
                var vsSpy3mW  = vizWidth(vsSpy3m, ranges['vs_spy_3m'][0], ranges['vs_spy_3m'][1]);
                var dailyCl   = daily   != null ? (daily   > 0 ? 'price-up' : (daily   < 0 ? 'price-down' : '')) : '';
                var fiveCl    = five    != null ? (five    > 0 ? 'price-up' : (five    < 0 ? 'price-down' : '')) : '';
                var twentyCl  = twenty  != null ? (twenty  > 0 ? 'price-up' : (twenty  < 0 ? 'price-down' : '')) : '';
                var fiftyCl   = fifty   != null ? (fifty   > 0 ? 'price-up' : (fifty   < 0 ? 'price-down' : '')) : '';
                var ytdCl     = ytd     != null ? (ytd     > 0 ? 'price-up' : (ytd     < 0 ? 'price-down' : '')) : '';
                var vsSpyCl   = vsSpy   != null ? (vsSpy   > 0 ? 'price-up' : (vsSpy   < 0 ? 'price-down' : '')) : '';
                var vsSpy3mCl = vsSpy3m != null ? (vsSpy3m > 0 ? 'price-up' : (vsSpy3m < 0 ? 'price-down' : '')) : '';
                var cr = r.cr;
                var crDisplay = (cr != null) ? cr : 0;
                var crColor = crDisplay <= 30 ? '#e05c5c' : crDisplay <= 60 ? '#f0a030' : '#34d4a4';
                var letf = (r.long && r.long.length) || (r.short && r.short.length) ? '1' : '0';
                var abc = r.abc || '';
                var adrPct = r.adr_pct != null ? r.adr_pct : 0;
                var labelClass = getGroupLabelClass(groupName, r.ticker);
                var distMAAll = r.dist_ma || {};
                var distMAKey = activeMAType + activeMALength;
                var distMAVal = distMAAll[distMAKey] != null ? distMAAll[distMAKey] : null;
                var distMACl  = distMAVal != null ? (distMAVal > 0 ? 'price-up' : (distMAVal < 0 ? 'price-down' : '')) : '';
                var distMAW   = distMAVal != null ? Math.min(100, Math.max(0, (Math.abs(distMAVal) / 20) * 100)) : 0;
                var distMAAllJson = JSON.stringify(distMAAll).replace(/"/g, '&quot;');
                html += '<tr class="ticker-row" onclick="updateChart(\'' + r.ticker + '\', this)" data-symbol="' + r.ticker + '" data-group="' + groupName.replace(/"/g, '&quot;') + '" data-daily="' + (daily != null ? daily : 0) + '" data-1w="' + (five != null ? five : 0) + '" data-1m="' + (twenty != null ? twenty : 0) + '" data-3m="' + (fifty != null ? fifty : 0) + '" data-ytd="' + (ytd != null ? ytd : 0) + '" data-vs_spy="' + (vsSpy != null ? vsSpy : 0) + '" data-vs_spy_3m="' + (vsSpy3m != null ? vsSpy3m : 0) + '" data-cr="' + (cr != null ? cr : 0) + '" data-adr_pct="' + adrPct + '" data-dist_ma="' + (distMAVal != null ? distMAVal : 0) + '" data-dist_ma_all="' + distMAAllJson + '" data-abc="' + abc + '" data-letf="' + letf + '" data-index="' + i + '">';
                var displayTicker = r.ticker.replace('^', '').replace('=F', '');
                var NON_ETF = {'^VIX':1,'CL=F':1,'^TNX':1,'MSTR':1,'BMNR':1,'WGMI':1,'SOLZ':1,'PURR':1,'XRPI':1,'IBIT':1,'ETHA':1,'TLT':1};
                var isEtf = !NON_ETF[r.ticker];
                var holdingsBtn = isEtf
                    ? '<button class="holdings-btn" onclick="event.stopPropagation();showHoldings(\'' + escapeHtml(r.ticker) + '\')" title="Top 10 Holdings">▼</button>'
                    : '<span style="width:15px;flex-shrink:0;display:inline-block"></span>';
                html += '<td><div class="ticker-cell"><span class="ticker-label ' + labelClass + '">' + displayTicker + '</span>' + holdingsBtn + '</div></td>';
                html += '<td>' + (abc ? '<span class="abc-rating abc-' + abc.toLowerCase() + '">' + abc + '</span>' : '-') + '</td>';
                html += '<td class="' + dailyCl   + '">' + (daily   != null ? '<div class="value-visualization"><div class="value-bar ' + (daily   >= 0 ? 'positive' : 'negative') + '" style="width:' + dailyW   + '%"></div><span class="value-text">' + (daily   >= 0 ? '+' : '') + daily.toFixed(2)   + '%</span></div>' : 'N/A') + '</td>';
                html += '<td class="' + fiveCl    + '">' + (five    != null ? '<div class="value-visualization"><div class="value-bar ' + (five    >= 0 ? 'positive' : 'negative') + '" style="width:' + fiveW    + '%"></div><span class="value-text">' + (five    >= 0 ? '+' : '') + five.toFixed(2)    + '%</span></div>' : 'N/A') + '</td>';
                html += '<td class="' + twentyCl  + '">' + (twenty  != null ? '<div class="value-visualization"><div class="value-bar ' + (twenty  >= 0 ? 'positive' : 'negative') + '" style="width:' + twentyW  + '%"></div><span class="value-text">' + (twenty  >= 0 ? '+' : '') + twenty.toFixed(2)  + '%</span></div>' : 'N/A') + '</td>';
                html += '<td class="' + fiftyCl   + '">' + (fifty   != null ? '<div class="value-visualization"><div class="value-bar ' + (fifty   >= 0 ? 'positive' : 'negative') + '" style="width:' + fiftyW   + '%"></div><span class="value-text">' + (fifty   >= 0 ? '+' : '') + fifty.toFixed(2)   + '%</span></div>' : 'N/A') + '</td>';
                html += '<td class="' + ytdCl     + '">' + (ytd     != null ? '<div class="value-visualization"><div class="value-bar ' + (ytd     >= 0 ? 'positive' : 'negative') + '" style="width:' + ytdW     + '%"></div><span class="value-text">' + (ytd     >= 0 ? '+' : '') + ytd.toFixed(2)     + '%</span></div>' : 'N/A') + '</td>';
                html += '<td class="' + vsSpyCl   + '">' + (vsSpy   != null ? '<div class="value-visualization"><div class="value-bar ' + (vsSpy   >= 0 ? 'positive' : 'negative') + '" style="width:' + vsSpyW   + '%"></div><span class="value-text">' + (vsSpy   >= 0 ? '+' : '') + vsSpy.toFixed(2)   + '%</span></div>' : 'N/A') + '</td>';
                html += '<td class="' + vsSpy3mCl + '">' + (vsSpy3m != null ? '<div class="value-visualization"><div class="value-bar ' + (vsSpy3m >= 0 ? 'positive' : 'negative') + '" style="width:' + vsSpy3mW + '%"></div><span class="value-text">' + (vsSpy3m >= 0 ? '+' : '') + vsSpy3m.toFixed(2) + '%</span></div>' : 'N/A') + '</td>';
                html += '<td class="dist-ma-cell ' + distMACl + '" data-dist-all="' + distMAAllJson + '">' +
                    (distMAVal != null ? '<div class="value-visualization"><div class="value-bar ' + (distMAVal >= 0 ? 'positive' : 'negative') + '" style="width:' + distMAW + '%"></div><span class="value-text">' + (distMAVal >= 0 ? '+' : '') + distMAVal.toFixed(2) + '%</span></div>' : 'N/A') + '</td>';
                html += '<td>' + (r.adr_pct != null ? r.adr_pct.toFixed(2) + '%' : 'N/A') + '</td>';
                html += '<td style="font-weight:bold;color:' + crColor + '">' + crDisplay.toFixed(1) + '%</td>';
                html += '<td class="etf-list">';
                if (r.long && r.long.length) html += r.long.map(function(etf){ return '<span class="long-etf" onclick="event.stopPropagation();updateChart(\'' + etf + '\')">' + etf + '</span>'; }).join(', ');
                if (r.short && r.short.length) { if (r.long && r.long.length) html += '<br>'; html += r.short.map(function(etf){ return '<span class="short-etf" onclick="event.stopPropagation();updateChart(\'' + etf + '\')">' + etf + '</span>'; }).join(', '); }
                if (!(r.long && r.long.length) && !(r.short && r.short.length)) html += '-';
                html += '</td></tr>';
            }
            html += '</tbody></table></div>';
        }
        document.getElementById('groups-container').innerHTML = html;

        // Inject dynamic styles for Industries ticker colors
        if (meta && meta.Industries_COLORS) {
            var style = document.createElement('style');
            var css = '';
            for (var t in meta.Industries_COLORS)
                css += '.ticker-label-' + t + '{background-color:' + meta.Industries_COLORS[t] + ';color:white} ';
            style.textContent = css;
            document.head.appendChild(style);
        }

        initApp();
    }

    function initChart(symbol) {
        var tvSymbolMap = { '^VIX': 'TVC:VIX', 'CL=F': 'NYMEX:CL1!', '^TNX': 'TVC:TNX' };
        var tvSymbol = tvSymbolMap[symbol] || symbol;
        if (chartWidget) { chartWidget.remove(); chartWidget = null; }
        chartWidget = new TradingView.widget({
            allow_symbol_change: true, calendar: false, details: true, hide_side_toolbar: false, hide_top_toolbar: false,
            hide_legend: false, hide_volume: true, hotlist: false, interval: 'D', locale: 'en', save_image: false,
            style: '1', symbol: tvSymbol, theme: 'dark', timezone: 'America/Toronto', toolbar_bg: '#1a1a1a', backgroundColor: '#1a1a1a',
            gridColor: 'rgba(255,255,255,0.1)', watchlist: [], withdateranges: true, studies: ['STD;MA%Ribbon', 'Volume@tv-basicstudies'],
            autosize: true, enable_publishing: false, container_id: 'tradingview-chart'
        });
    }

    window.updateChart = function(symbol, element) {
        if (activeMultiChartGroup !== null) closeMultiChart();
        allTickerRows.forEach(function(row) { row.classList.remove('active'); });
        if (element) {
            element.classList.add('active');
            currentIndex = allTickerRows.indexOf(element);
        } else {
            var row = [].slice.call(document.querySelectorAll('.ticker-row')).filter(function(r) { return r.getAttribute('data-symbol') === symbol; })[0];
            if (row) { row.classList.add('active'); currentIndex = allTickerRows.indexOf(row); }
        }
        initChart(symbol);
        var activeRow = document.querySelector('.ticker-row.active');
        if (activeRow) activeRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    };

    window.scrollToGroup = function(groupName) {
        var el = document.getElementById('group-' + safeGroupId(groupName));
        if (el) el.scrollIntoView({ behavior: 'smooth' });
    };

    window.sortGroup = function(group, sortBy) {
        var tables = document.querySelectorAll('.ticker-table');
        var table = null;
        for (var t = 0; t < tables.length; t++) {
            if (tables[t].getAttribute('data-group') === group) { table = tables[t]; break; }
        }
        if (!table) return;
        var tbody = table.querySelector('tbody');
        var rows = [].slice.call(tbody.querySelectorAll('.ticker-row'));
        var state = currentSortStates[group] || { sortBy: null, direction: 1, count: 0 };
        currentSortStates[group] = state;

        table.querySelectorAll('th, td').forEach(function(el) { el.classList.remove('sort-asc', 'sort-desc', 'sorted-column'); });

        if (state.sortBy === sortBy) {
            state.count++;
            if (state.count >= 3) {
                state.sortBy = null; state.direction = 1; state.count = 0;
                rows.sort(function(a, b) { return parseInt(a.getAttribute('data-index')) - parseInt(b.getAttribute('data-index')); });
                tbody.innerHTML = ''; rows.forEach(function(r) { tbody.appendChild(r); });
                updateAllTickerRows(); return;
            }
        } else state.count = 1;
        state.sortBy = sortBy;
        if (state.count === 2) state.direction *= -1; else state.direction = 1;

        var colMap = { symbol: 0, abc: 1, daily: 2, '1w': 3, '1m': 4, '3m': 5, ytd: 6, vs_spy: 7, vs_spy_3m: 8, dist_ma: 9, adr_pct: 10, cr: 11, letf: 12 };
        var hi = colMap[sortBy] !== undefined ? colMap[sortBy] : 11;
        var headerIndices = [hi];
        headerIndices.forEach(function(idx) {
            var h = table.querySelectorAll('th')[idx];
            if (h) h.classList.add(state.direction === 1 ? 'sort-asc' : 'sort-desc', 'sorted-column');
        });
        rows.forEach(function(row) {
            var cells = row.querySelectorAll('td');
            headerIndices.forEach(function(idx) { if (cells[idx]) cells[idx].classList.add('sorted-column'); });
        });

        var tickerToSector = (meta && meta.TICKER_TO_SECTOR) ? meta.TICKER_TO_SECTOR : {};
        var sectorOrder = (meta && meta.SECTOR_ORDER) ? meta.SECTOR_ORDER : [];
        function sectorIndex(s) { var i = sectorOrder.indexOf(s); return i >= 0 ? i : sectorOrder.length; }

        rows.sort(function(a, b) {
            var aVal, bVal;
            if (sortBy === 'symbol') {
                if (group === 'Industries') {
                    var aT = a.getAttribute('data-symbol'), bT = b.getAttribute('data-symbol');
                    var aS = tickerToSector[aT] || 'Unknown', bS = tickerToSector[bT] || 'Unknown';
                    if (sectorIndex(aS) !== sectorIndex(bS)) return (sectorIndex(aS) - sectorIndex(bS)) * state.direction;
                    return (aT.toLowerCase().localeCompare(bT.toLowerCase())) * state.direction;
                }
                return (a.getAttribute('data-symbol').toLowerCase().localeCompare(b.getAttribute('data-symbol').toLowerCase())) * state.direction;
            } else if (sortBy === 'abc') {
                return ((a.getAttribute('data-abc') || '').localeCompare(b.getAttribute('data-abc') || '')) * state.direction;
            } else if (sortBy === 'letf') {
                return (parseInt(a.getAttribute('data-letf') || '0') - parseInt(b.getAttribute('data-letf') || '0')) * state.direction;
            } else {
                return (parseFloat(a.getAttribute('data-' + sortBy)) - parseFloat(b.getAttribute('data-' + sortBy))) * state.direction;
            }
        });
        tbody.innerHTML = ''; rows.forEach(function(r) { tbody.appendChild(r); });
        updateAllTickerRows();
        var ar = document.querySelector('.ticker-row.active');
        if (ar) currentIndex = allTickerRows.indexOf(ar);
    };

    function updateAllTickerRows() {
        allTickerRows = [];
        document.querySelectorAll('.ticker-table').forEach(function(table) {
            [].slice.call(table.querySelectorAll('.ticker-row')).forEach(function(row) { allTickerRows.push(row); });
        });
    }

    function initApp() {
        // Sync DistMA button states to saved settings
        document.querySelectorAll('.dist-ma-type-btn').forEach(function(b) {
            b.classList.toggle('active', b.getAttribute('data-type') === activeMAType);
        });
        document.querySelectorAll('.dist-ma-len-btn').forEach(function(b) {
            b.classList.toggle('active', parseInt(b.getAttribute('data-len')) === activeMALength);
        });
        allTickerRows = [].slice.call(document.querySelectorAll('.ticker-row'));
        document.querySelectorAll('.ticker-table').forEach(function(table) {
            var g = table.getAttribute('data-group');
            currentSortStates[g] = { sortBy: null, direction: 1, count: 0 };
        });
        var listEl = document.querySelector('.ticker-list');
        if (listEl && !listEl._sortDelegate) {
            listEl._sortDelegate = true;
            listEl.addEventListener('click', function(ev) {
                var th = ev.target.closest('th.sortable');
                if (!th) return;
                var table = th.closest('table.ticker-table');
                if (!table) return;
                var group = table.getAttribute('data-group');
                var sortBy = th.getAttribute('data-sort-by');
                if (group && sortBy) window.sortGroup(group, sortBy);
            });
        }
        var defaultSymbol = (meta && meta.default_symbol) ? meta.default_symbol : 'QQQE';
        initChart(defaultSymbol);
        if (allTickerRows.length > 0) {
            allTickerRows[0].classList.add('active');
        }
        document.addEventListener('keydown', function(e) {
            var hModal = document.getElementById('holdings-modal-overlay');
            if (hModal && hModal.style.display !== 'none') return;
            if (e.key === 'ArrowDown') { e.preventDefault(); if (currentIndex < allTickerRows.length - 1) { currentIndex++; updateChart(allTickerRows[currentIndex].getAttribute('data-symbol'), allTickerRows[currentIndex]); } }
            if (e.key === 'ArrowUp')   { e.preventDefault(); if (currentIndex > 0) { currentIndex--; updateChart(allTickerRows[currentIndex].getAttribute('data-symbol'), allTickerRows[currentIndex]); } }
        });
    }

    function loadData() {
        Promise.all([
            fetch('data/snapshot.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; }),
            fetch('data/meta.json').then(function(res) { return res.ok ? res.json() : null; }).catch(function() { return null; })
        ]).then(function(results) {
            snapshot = results[0];
            meta = results[1];
            renderGroups();
        }).catch(function() {
            document.getElementById('groups-container').innerHTML = '<div class="loading-msg">LOADING DATA... (Run scripts/build_data.py or wait for GitHub Actions)</div>';
        });
    }

    window.toggleDistMASettings = function(btn) {
        var dropdown = document.getElementById('dist-ma-dropdown');
        if (!dropdown) return;
        if (dropdown.classList.contains('open')) { dropdown.classList.remove('open'); return; }
        var rect = btn.getBoundingClientRect();
        dropdown.style.top  = (rect.bottom + 4) + 'px';
        dropdown.style.left = Math.max(4, rect.right - 195) + 'px';
        dropdown.classList.add('open');
    };

    document.addEventListener('click', function(e) {
        var dropdown = document.getElementById('dist-ma-dropdown');
        if (!dropdown || !dropdown.classList.contains('open')) return;
        if (!dropdown.contains(e.target) && !e.target.classList.contains('dist-ma-settings-btn')) {
            dropdown.classList.remove('open');
        }
    });

    window.setDistMAType = function(type) {
        activeMAType = type;
        localStorage.setItem('distMAType', type);
        document.querySelectorAll('.dist-ma-type-btn').forEach(function(b) {
            b.classList.toggle('active', b.getAttribute('data-type') === type);
        });
        applyDistMASettings();
    };

    window.setDistMALength = function(len) {
        activeMALength = len;
        localStorage.setItem('distMALength', len);
        document.querySelectorAll('.dist-ma-len-btn').forEach(function(b) {
            b.classList.toggle('active', parseInt(b.getAttribute('data-len')) === len);
        });
        applyDistMASettings();
    };

    function applyDistMASettings() {
        var key = activeMAType + activeMALength;
        document.querySelectorAll('.dist-ma-cell').forEach(function(cell) {
            var raw = cell.getAttribute('data-dist-all');
            var val = null;
            try { val = JSON.parse(raw.replace(/&quot;/g, '"'))[key]; } catch(e) {}
            if (val == null) { cell.innerHTML = 'N/A'; cell.className = 'dist-ma-cell'; return; }
            var cl = val > 0 ? 'price-up' : (val < 0 ? 'price-down' : '');
            cell.className = 'dist-ma-cell ' + cl;
            var w = Math.min(100, Math.max(0, (Math.abs(val) / 20) * 100));
            var barCl = val >= 0 ? 'positive' : 'negative';
            cell.innerHTML = '<div class="value-visualization"><div class="value-bar ' + barCl + '" style="width:' + w + '%"></div><span class="value-text">' + (val >= 0 ? '+' : '') + val.toFixed(2) + '%</span></div>';
            // Update the row's data-dist_ma for sorting
            var row = cell.closest('tr');
            if (row) row.setAttribute('data-dist_ma', val);
        });
        // Update tooltip on all DistMA headers
        document.querySelectorAll('th[data-sort-by="dist_ma"]').forEach(function(th) {
            th.setAttribute('data-tooltip', '% distance from ' + activeMAType + ' ' + activeMALength + '. Click ⋯ to change.');
        });
    }

    // --- Holdings ---
    var holdingsList = [];
    var holdingsIndex = -1;

    window.showHoldings = function(symbol) {
        var modal   = document.getElementById('holdings-modal-overlay');
        var title   = document.getElementById('holdings-modal-title');
        var content = document.getElementById('holdings-modal-content');
        if (!modal || !title || !content) return;
        holdingsList = []; holdingsIndex = -1;
        title.textContent = symbol + ' — Top 10 Holdings';
        content.innerHTML = '<div class="holdings-msg">Loading...</div>';
        modal.style.display = 'block';
        fetch('data/holdings/' + symbol + '.json')
            .then(function(res) { return res.ok ? res.json() : Promise.reject(); })
            .then(function(data) {
                if (data && data.holdings && data.holdings.length > 0) {
                    holdingsList = data.holdings;
                    content.innerHTML = data.holdings.map(function(h, i) {
                        return '<div class="holdings-item" onclick="selectHolding(\'' + escapeHtml(h.symbol) + '\',' + i + ')">' +
                            '<span class="holdings-rank">' + (i + 1) + '</span>' +
                            '<span class="holdings-symbol">' + escapeHtml(h.symbol) + '</span>' +
                            '<span class="holdings-weight">' + (h.weight != null ? h.weight.toFixed(2) + '%' : '—') + '</span>' +
                            '</div>';
                    }).join('');
                } else {
                    content.innerHTML = '<div class="holdings-msg">No holdings data available</div>';
                }
            })
            .catch(function() {
                content.innerHTML = '<div class="holdings-msg">Holdings not available for this ETF</div>';
            });
    };

    window.closeHoldings = function() {
        var modal = document.getElementById('holdings-modal-overlay');
        if (modal) modal.style.display = 'none';
        holdingsList = []; holdingsIndex = -1;
    };

    window.selectHolding = function(symbol, index) {
        if (typeof index === 'number') holdingsIndex = index;
        updateHoldingsHighlight();
        updateChart(symbol);
    };

    function updateHoldingsHighlight() {
        document.querySelectorAll('.holdings-item').forEach(function(item, i) {
            item.classList.toggle('active', i === holdingsIndex);
            if (i === holdingsIndex) item.scrollIntoView({ block: 'nearest' });
        });
    }

    document.addEventListener('keydown', function(e) {
        var modal = document.getElementById('holdings-modal-overlay');
        if (!modal || modal.style.display === 'none') return;
        if (e.key === 'Escape') { closeHoldings(); return; }
        if (!holdingsList.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            holdingsIndex = Math.min(holdingsIndex + 1, holdingsList.length - 1);
            updateHoldingsHighlight();
            if (holdingsIndex >= 0) updateChart(holdingsList[holdingsIndex].symbol);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            holdingsIndex = Math.max(holdingsIndex - 1, 0);
            updateHoldingsHighlight();
            if (holdingsIndex >= 0) updateChart(holdingsList[holdingsIndex].symbol);
        }
    });

    // --- MultiChart ---
    var multiChartWidgets = [];
    var activeMultiChartGroup = null;
    var tvSymbolMap = { '^VIX': 'TVC:VIX', 'CL=F': 'NYMEX:CL1!', '^TNX': 'TVC:TNX' };

    function destroyMultiCharts() {
        multiChartWidgets.forEach(function(w) { try { w.remove(); } catch(e) {} });
        multiChartWidgets = [];
        document.getElementById('multi-chart-grid').innerHTML = '';
    }

    window.toggleMultiChart = function(groupName) {
        if (activeMultiChartGroup === groupName) { closeMultiChart(); return; }
        openMultiChart(groupName);
    };

    function openMultiChart(groupName) {
        activeMultiChartGroup = groupName;
        destroyMultiCharts();
        document.getElementById('single-chart-panel').style.display = 'none';
        document.getElementById('multi-chart-panel').style.display = 'block';
        document.querySelectorAll('.multichart-btn').forEach(function(btn) {
            var isThis = btn.getAttribute('data-group') === groupName;
            btn.classList.toggle('active', isThis);
            btn.textContent = isThis ? 'SingleChart' : 'MultiChart';
        });
        var rows = snapshot && snapshot.groups && snapshot.groups[groupName];
        if (!rows) return;
        var grid = document.getElementById('multi-chart-grid');
        rows.forEach(function(r, i) {
            var cId = 'mc-' + i + '-' + safeGroupId(groupName);
            var wrap = document.createElement('div');
            wrap.className = 'mini-chart-wrap';
            var lbl = document.createElement('div');
            lbl.className = 'mini-chart-label';
            lbl.textContent = r.ticker.replace('^','').replace('=F','');
            var cd = document.createElement('div');
            cd.id = cId;
            cd.style.cssText = 'height:100%;width:100%;';
            wrap.appendChild(lbl);
            wrap.appendChild(cd);
            grid.appendChild(wrap);
            var sym = tvSymbolMap[r.ticker] || r.ticker;
            var w = new TradingView.widget({
                interval: 'D', locale: 'en', style: '1',
                symbol: sym, theme: 'dark',
                timezone: 'America/Toronto',
                toolbar_bg: '#1a1a1a', backgroundColor: '#1a1a1a',
                gridColor: 'rgba(255,255,255,0.1)',
                studies: ['STD;MA%Ribbon'],
                hide_side_toolbar: true, hide_top_toolbar: true,
                hide_legend: true, withdateranges: false,
                save_image: false, enable_publishing: false,
                autosize: true, container_id: cId
            });
            multiChartWidgets.push(w);
        });
    }

    function closeMultiChart() {
        activeMultiChartGroup = null;
        destroyMultiCharts();
        document.getElementById('single-chart-panel').style.display = 'flex';
        document.getElementById('multi-chart-panel').style.display = 'none';
        document.querySelectorAll('.multichart-btn').forEach(function(btn) {
            btn.classList.remove('active');
            btn.textContent = 'MultiChart';
        });
    }

    loadData();

    // Column header tooltips
    (function() {
        var tip = document.createElement('div');
        tip.id = 'col-tooltip';
        document.body.appendChild(tip);
        var hideTimer;
        document.addEventListener('mouseover', function(e) {
            var th = e.target.closest('th[data-tooltip]');
            if (!th) return;
            clearTimeout(hideTimer);
            var rect = th.getBoundingClientRect();
            tip.textContent = th.getAttribute('data-tooltip');
            tip.style.left = Math.min(rect.left + rect.width / 2 - 100, window.innerWidth - 220) + 'px';
            tip.style.top = (rect.bottom + 6) + 'px';
            tip.classList.add('visible');
        });
        document.addEventListener('mouseout', function(e) {
            var th = e.target.closest('th[data-tooltip]');
            if (!th) return;
            hideTimer = setTimeout(function() { tip.classList.remove('visible'); }, 100);
        });
    })();
})();
    </script>
